/* ---------- sound effects (Web Audio, retro blips) ---------- */
let actx=null, muted=false, selStep=-1;
function ensureAudio(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } }
  if(actx && actx.state==='suspended') actx.resume();
}
function beep(freq,dur,type,vol){
  if(muted||!actx)return;
  const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol||.12,t+.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||.08));
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+(dur||.08)+.02);
}
function sfx(n){
  if(muted||!actx)return;
  switch(n){
    case 'step':   beep(170+Math.random()*24,.05,'square',.05); break;
    case 'click':  beep(470,.05,'square',.09); break;
    case 'select': beep(620,.06,'triangle',.12); setTimeout(()=>beep(880,.07,'triangle',.1),55); break;
    case 'status': beep(520,.06,'square',.12); setTimeout(()=>beep(784,.09,'square',.11),60); break;
    case 'add':    [523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,.09,'triangle',.12),i*70)); break;
    case 'delete': [500,380,260].forEach((f,i)=>setTimeout(()=>beep(f,.09,'square',.11),i*70)); break;
    case 'save':   beep(700,.08,'triangle',.12); setTimeout(()=>beep(1046,.12,'triangle',.1),80); break;
    case 'coin':   beep(988,.06,'square',.11); setTimeout(()=>beep(1319,.1,'square',.1),60); break;
    case 'gift':   [659,830,988,1319].forEach((f,i)=>setTimeout(()=>beep(f,.08,'triangle',.11),i*65)); break;
    case 'fanfare':[523,659,784,1046,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,i<4?.09:.16,'square',.11),i*90)); break;
    case 'notice': beep(880,.09,'square',.1); setTimeout(()=>beep(880,.09,'square',.1),140); setTimeout(()=>beep(1175,.14,'square',.1),300); break;
  }
}
/* ---------- BGM（レトロ8bitループ・ON/OFF可） ---------- */
let bgmOn=false, bgmTimer=null, bgmStep=0;
const BGM_STEP=0.15;                                   // 8分音符の長さ(秒)
const NOTE=n=>440*Math.pow(2,n/12);                    // A4=440 からの半音
const BGM_MELODY=[ 7,10,12,10, 7,5,3,5, 7,7,10,7, 5,3,5,null,
                   3,5,7,10, 12,10,7,5, 3,5,7,5, 3,null,3,null ];
const BGM_BASS  =[ -21,null,-14,null, -21,null,-14,null, -16,null,-14,null, -16,null,-14,null,
                   -12,null,-17,null, -12,null,-17,null, -16,null,-14,null, -16,null,-14,null ];
function bgmBeep(freq,dur,type,vol){
  if(!actx) return;
  const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+dur+.02);
}
function bgmTick(){
  if(!bgmOn||!actx||document.hidden) return;
  const m=BGM_MELODY[bgmStep%BGM_MELODY.length], b=BGM_BASS[bgmStep%BGM_BASS.length];
  if(m!=null) bgmBeep(NOTE(m),  BGM_STEP*0.9,  'square',   .035);
  if(b!=null) bgmBeep(NOTE(b),  BGM_STEP*0.95, 'triangle', .055);
  bgmStep++;
}
function updateBgmUI(){
  const btn=document.getElementById('bgmBtn'), ic=document.getElementById('bgmIc');
  if(!btn) return;
  btn.style.opacity=bgmOn?1:.5;
  ic.style.background=bgmOn?'#8a3a8f':'#8f9bb3';
}
function toggleBgm(){
  ensureAudio();
  if(bgmOn){ bgmOn=false; clearInterval(bgmTimer); toast('BGM OFF'); }
  else { bgmOn=true; bgmStep=0; clearInterval(bgmTimer); bgmTimer=setInterval(bgmTick,BGM_STEP*1000); toast('🎵 BGM ON'); }

}

  {x1:4,    y1:16, x2:VW-4,  y2:500, push:508, msg:'⛔ アイドルの部屋には入れません'},

function fanZoneHit(x,y){
  for(const z of NO_FAN_ZONES){ if(x>z.x1&&x<z.x2&&y>z.y1&&y<z.y2) return z; }
  return null;
}
function clampFanZones(c){
  if(c.kind==='idol') return;
  let z=fanZoneHit(c.tx,c.ty); if(z) c.ty=z.push;
  z=fanZoneHit(c.x,c.y); if(z){ c.y=z.push; if(c.ty<z.push) c.ty=z.push; }

  try{ const n=parseInt(hex.slice(1),16), r=(n>>16)&255, g=(n>>8)&255, b=n&255;
    const m=x=>Math.round(x+(255-x)*f);
    return '#'+((1<<24)+(m(r)<<16)+(m(g)<<8)+m(b)).toString(16).slice(1);
  }catch(e){ return '#f2ecdf'; }
}

function drawArtistArea(ax, aw){
  const x=ax+10,y=44,w=(aw||VW)-20,h=452;
  P(x-4,y-20,w+8,18,'#20182e'); P(x-2,y-18,w+4,14,'#e05a9a'); P(x-2,y-18,w+4,4,'#f07ab0');   // 屋根帯
  P(ax+VW/2-1,y-26,2,5,'#ffd23f'); P(ax+VW/2-3,y-24,6,2,'#ffd23f');                          // 星
  P(x-2,y-2,w+4,h+4,'#20182e'); P(x,y,w,h,'#fdf0f6');
  const ix=x+6, iy=y+8, iw=w-12, ih=h-36;
  P(ix-1,iy-1,iw+2,ih+2,'#5c4633');
  const idolsA=employees.filter(c=>c.kind==='idol');
  const rows=3;
  const nShow=Math.max(6, idolsA.length);                 // 最低6部屋、増えたら拡張
  const cols=Math.max(2, Math.ceil(nShow/rows));          // 列を増やす＝左へ伸ばす
  const rw=iw/cols, rh=Math.floor(ih/rows);
  // 空の部屋（背景グリッド）
  for(let c2=0;c2<cols;c2++) for(let r=0;r<rows;r++){
    const rx=ix+c2*rw, ry=iy+r*rh;
    P(Math.round(rx),ry,Math.ceil(rw),rh,'#f4eee2');
    P(Math.round(rx),ry,Math.ceil(rw),1,'#5c4633'); P(Math.round(rx),ry,1,rh,'#5c4633');
  }
  // アイドルの部屋は右端の列から左へ割り当てる（増えたら左へ）
  ART_ROOMS=[];

/* フォーカス中（1回目タップ）：白いぶちで光る */
function drawFocusGlow(c,t){
  const x=c.x, y=c.y, pulse=(Math.sin(t*6)+1)/2;
  ctx.save();
  ctx.shadowColor='#ffffff'; ctx.shadowBlur=8+pulse*8;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
  ctx.globalAlpha=.7+pulse*0.3;
  const w=24, h=38;

  ctx.restore();
}
/* 自分のキャラを見失わないための赤い枠＋▼マーカー（点滅） */
function drawSelfRing(c,t){
  const x=c.x, y=c.y, pulse=(Math.sin(t*4)+1)/2;
  ctx.save();
  ctx.strokeStyle='#ff2d55'; ctx.lineWidth=2+pulse;
  ctx.globalAlpha=.5+pulse*0.5;
  const w=26, h=40;
  ctx.strokeRect(Math.round(x-w/2), Math.round(y-h+8), w, h);
  // ▼マーカー
  ctx.fillStyle='#ff2d55'; ctx.globalAlpha=1;
  const my=y-h+2-Math.round(pulse*2);
  ctx.beginPath(); ctx.moveTo(x-4,my-6); ctx.lineTo(x+4,my-6); ctx.lineTo(x,my); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawChar(c){
  const t=performance.now()/1000;
  // 止まっている時は状況に応じたポーズ
  if(!c.moving && (c.status==='sleep'||c.status==='off')){ drawSleeping(c,t); return; }
  if(!c.moving && c.status==='eat'){ drawEating(c,t); return; }
  if(!c.moving && (c.status==='work'||c.status==='live'||c.status==='stage'||c.status==='dance'||c.status==='practice'||c.status==='haishin')){ drawDancing(c,t); return; }
  if(!c.moving && c.status==='shoot'){ drawFilming(c,t); return; }
  const step=c.moving?(Math.floor(t*7+c.animoff)%2):-1;
  const bob=c.moving&&step===1?1:0;
  const X=Math.round(c.x)-8, Y=Math.round(c.y)-16-bob;
  const {hair,skin,shirt,pants}=c.colors, OL='#20182e';
  const fem=c.gender==='female';
  const p=(x,y,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(X+x,Y+y,w,h);};
  // shadow
  ctx.fillStyle='#00000030'; ctx.beginPath(); ctx.ellipse(c.x,c.y-1,6,2.3,0,0,7); ctx.fill();

  if(fem) p(3,12,10,3,OL); else p(4,13,8,2,OL);
  const f=c.facing;
  if(c.face){                                      // カスタム顔（8x6ドット）
    if(fem){ p(3,5,2,7,hair); p(11,5,2,7,hair); }
    for(let fy=0;fy<FACE_H;fy++)for(let fx=0;fx<FACE_W;fx++){ const col=c.face[fy]&&c.face[fy][fx]; if(col) p(4+fx,2+fy,1,1,col); }
  } else {

    p(5,14,2,1,skin); p(9,14,2,1,skin);
  } else {
    if(step===0){ p(5,13,2,2,pants); p(9,13,1,2,pants); p(10,14,1,1,pants); }
    else if(step===1){ p(9,13,2,2,pants); p(5,13,1,2,pants); p(6,14,1,1,pants); }

/* ---------- update / movement (自動では動かない。クリック or 十字キーで移動) ---------- */
const SPEED=28;
const CHAR_SCALE=1.5;                                   // キャラの表示倍率
function update(dt){
  for(const c of employees){
    clampFanZones(c);                                    // ファンはステージ・アイドルの部屋に入れない
    let dx=0,dy=0;
    if(c===selected && held.size && canControl(c)){
      if(held.has('up'))dy-=1; if(held.has('down'))dy+=1;
      if(held.has('left'))dx-=1; if(held.has('right'))dx+=1;
      c.tx=null;
    }
    if(!(dx||dy) && c.tx!=null){
      const ddx=c.tx-c.x, ddy=c.ty-c.y, d=Math.hypot(ddx,ddy);
      if(d<1.5){ c.tx=null; c.dash=false; } else { dx=ddx/d; dy=ddy/d; }
    }
    const mv=Math.hypot(dx,dy);
    if(mv>0){ dx/=mv; dy/=mv;
      const sp=SPEED*(c.dash?2.2:1);                    // 2回タップで走る
      c.x=clamp(c.x+dx*sp*dt, BND.x1, BND.x2);
      c.y=clamp(c.y+dy*sp*dt, BND.y1, BND.y2);
      c.moving=true;
      if(Math.abs(dx)>Math.abs(dy)) c.facing=dx<0?'left':'right'; else c.facing=dy<0?'up':'down';
    } else c.moving=false;
  }
}
function moveTo(c,place){ const z=PLACES[place];
  c.tx=z.x1+Math.random()*(z.x2-z.x1); c.ty=z.y1+Math.random()*(z.y2-z.y1); }
function gatherAll(place){ employees.forEach(c=>{ if(!canControl(c)) return; moveTo(c,place); fbTouch(c); }); saveEmployees(); }

const deco={
  cars:[ {x:-30,y:510,dir:1,spd:30,col:'#e05a5a'}, {x:W+20,y:521,dir:-1,spd:24,col:'#4a8fe0'} ],
  cat:{x:800,y:380,tx:800,ty:380,spd:14,wait:0,face:1},
  dog:{x:760,y:200,tx:760,ty:200,spd:18,wait:0,face:1},
  birds:[ {x:20,y:26,dir:1,spd:34,ph:0}, {x:600,y:44,dir:-1,spd:28,ph:1.6}, {x:1100,y:18,dir:1,spd:40,ph:3.0} ],
};
function wanderPick(a){ a.tx=BND.x1+8+Math.random()*(BND.x2-BND.x1-16); a.ty=BND.y1+24+Math.random()*(BND.y2-BND.y1-34); }
function updateDeco(dt,t){
  for(const c of deco.cars){ c.x+=c.dir*c.spd*dt; if(c.dir>0&&c.x>W+20)c.x=-30; if(c.dir<0&&c.x<-30)c.x=W+20; }
  for(const a of [deco.cat,deco.dog]){
    a.wait-=dt; const dx=a.tx-a.x, dy=a.ty-a.y, d=Math.hypot(dx,dy);
    if(d<2){ if(a.wait<=0){ wanderPick(a); a.wait=1+Math.random()*2.5; } }
    else { a.x+=dx/d*a.spd*dt; a.y+=dy/d*a.spd*dt; a.face=dx<0?-1:1; }
  }
  for(const b of deco.birds){ b.x+=b.dir*b.spd*dt; if(b.dir>0&&b.x>W+6)b.x=-14; if(b.dir<0&&b.x<-14)b.x=W+6; b.y+=Math.sin(t*2+b.ph)*0.15; }
}
function drawCarF(x,y,dir,col){
  const p=(dx,dy,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(Math.round(x+dx),Math.round(y+dy),w,h); };
  ctx.fillStyle='#00000022'; ctx.fillRect(Math.round(x),Math.round(y+11),22,2);
  p(-1,-1,22,12,'#20182e'); p(0,0,20,10,col); p(0,0,20,3,'#ffffff55');
  p(dir>0?11:3,2,6,4,'#bfe6ef'); p(2,9,4,3,'#20182e'); p(14,9,4,3,'#20182e'); p(dir>0?18:0,4,2,3,'#ffe36a');
}
function drawCat(a,t){ const x=Math.round(a.x),y=Math.round(a.y),f=a.face,OL='#20182e',col='#8a8a92';
  const p=(dx,dy,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(x+dx,y+dy,w,h); };
  const walk=Math.floor(t*6)%2;
  ctx.fillStyle='#00000022'; ctx.fillRect(x-5,y+3,11,2);
  p(-4,-3,8,5,col); p(-4,-3,8,1,'#a7a7ae');
  p(f>0?2:-5,-6,4,4,col); p(f>0?2:-5,-7,1,1,col); p(f>0?5:-2,-7,1,1,col);   // head+ears
  p(f>0?-6:4,-4,2,1,col); p(f>0?-7:6,-5,1,1,col);                            // tail
  p(f>0?4:-4,-5,1,1,OL);                                                     // eye
  p(-3,2,1,2, walk?'#6f6f77':col); p(2,2,1,2, walk?col:'#6f6f77');           // legs
}
function drawDog(a,t){ const x=Math.round(a.x),y=Math.round(a.y),f=a.face,OL='#20182e',col='#c08a4a';
  const p=(dx,dy,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(x+dx,y+dy,w,h); };
  const walk=Math.floor(t*6)%2;
  ctx.fillStyle='#00000022'; ctx.fillRect(x-6,y+4,12,2);
  p(-5,-3,10,6,col); p(-5,-3,10,1,'#d6a066');
  p(f>0?3:-8,-6,5,5,col); p(f>0?3:-8,-6,1,3,'#8a5a2b'); p(f>0?8:-9,-2,2,2,col); // head+ear+snout
  p(f>0?-7:5,-5,2,2,col);                                                       // tail
  p(f>0?6:-6,-4,1,1,OL);                                                        // eye
  p(-4,3,1,2, walk?'#8a5a2b':col); p(3,3,1,2, walk?col:'#8a5a2b');              // legs
}
function drawBird(b,t){ const x=Math.round(b.x),y=Math.round(b.y);
  ctx.fillStyle='#33323a'; ctx.fillRect(x,y,2,1);
  if(Math.sin(t*10+b.ph)>0){ ctx.fillRect(x-2,y-1,2,1); ctx.fillRect(x+2,y-1,2,1); }
  else { ctx.fillRect(x-2,y+1,2,1); ctx.fillRect(x+2,y+1,2,1); }
}

/* ---------- render loop ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min(.05,(now-last)/1000); last=now;
  update(dt);
  if(selected && selected.moving){
    const st=Math.floor((now/1000)*7+selected.animoff)%2;
    if(st===0 && st!==selStep) sfx('step');
    selStep=st;
  } else selStep=-1;
  // カメラ（エリアへスムーズ移動＋ズーム／2本指スライドで自由移動）
  const vw=VW/cam.z, vh=VH/cam.z;
  if(manualCam){
    cam.x=Math.min(Math.max(cam.x,0),Math.max(0,W-vw));
    if(vh>=H) cam.y=(H-vh)/2;
    else cam.y=Math.min(Math.max(cam.y,0),H-vh);
    const na=areaAtX(cam.x+vw/2);
    if(na!==curArea){ curArea=na; updateAreaUI(); }
  } else {
    const target=Math.min(Math.max(areaCamX(curArea)+(VW-vw)/2, 0), Math.max(0,W-vw));
    cam.x+=(target-cam.x)*Math.min(1,dt*7);
    cam.y=(H-vh)/2>0?Math.min(Math.max((H-vh)/2,0),H-vh):(H-vh)/2;
  }
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,VW,VH);
  ctx.save(); ctx.scale(cam.z,cam.z); ctx.translate(-cam.x,-cam.y);
  ctx.drawImage(bg,0,0);
  const t=now/1000;
  drawGifts();                                           // プレゼント（部屋の家具）
  drawBooks();                                           // 限定日記の本
  drawMarquee(t);                                        // 電光掲示板（予定）
  drawHunt(t);                                           // 宝探しの宝箱
  drawShowFx(t);                                         // 🎤 本番のステージ演出
  checkNotice();                                         // 📢 お知らせバナー
  updateShowBtn();                                       // 本番参加ボタン
  drawFountainFx(t);                                     // 噴水の水しぶき
  updateDeco(dt,t);
  deco.cars.forEach(c=>drawCarF(c.x,c.y,c.dir,c.col));   // 車（キャラの下）
  drawCat(deco.cat,t); drawDog(deco.dog,t);              // 猫・犬
  const mineSet=new Set(myChars().map(c=>c.id));
  [...employees].sort((a,b)=>a.y-b.y).forEach(c=>{
    const off=c.status==='off'; if(off) ctx.globalAlpha=0.4;   // 離脱中は半透明
    if(focusedId===c.id) drawFocusGlow(c,t);                   // フォーカス（白光）
    if(selfRing && mineSet.has(c.id)) drawSelfRing(c,t);       // 自分の赤枠
    ctx.save();
    ctx.translate(c.x, c.y+10);                                // 足元を基準に1.5倍
    ctx.scale(CHAR_SCALE, CHAR_SCALE);
    ctx.translate(-c.x, -(c.y+10));
    drawChar(c);
    ctx.restore();
    ctx.globalAlpha=1;
  });
  deco.birds.forEach(b=>drawBird(b,t));                  // 鳥（空・最前面）
  ctx.restore();
  positionTags();
  requestAnimationFrame(loop);
}
function positionTags(){
  const r=cv.getBoundingClientRect(), ar=document.getElementById('app').getBoundingClientRect();
  const sx=r.width/VW, sy=r.height/VH, ox=r.left-ar.left, oy=r.top-ar.top;
  const tx=wx=>ox+((wx-cam.x)*cam.z)*sx, ty=wy=>oy+((wy-cam.y)*cam.z)*sy;
  for(const c of employees){ if(!c.tagEl)continue;
    c.tagEl.style.transform=`translate(-50%,-100%) translate(${tx(c.x).toFixed(1)}px,${ty(c.y-30).toFixed(1)}px)`;
  }
  for(const L of worldLabels){ L.el.style.transform=`translate(-50%,-50%) translate(${tx(L.x).toFixed(1)}px,${ty(L.y).toFixed(1)}px)`; }
  for(const L of roomLabels){ L.el.style.transform=`translate(-50%,-50%) translate(${tx(L.x).toFixed(1)}px,${ty(L.y).toFixed(1)}px)`; }
}

/* tap & pinch on canvas（2本指でピンチズーム / タップで選択・移動） */
function handleTap(e){
  const r=cv.getBoundingClientRect();
  const wx=(e.clientX-r.left)/r.width*VW/cam.z+cam.x, wy=(e.clientY-r.top)/r.height*VH/cam.z+cam.y;
  if(tryHunt(wx,wy)) return;                             // 宝探し（最優先）
  let hit=null,best=19;
  for(const c of employees){ const d=Math.hypot(c.x-wx,(c.y-12)-wy); if(d<best){best=d;hit=c;} }
  if(hit){
    if(focusedId===hit.id){                             // 2回目：パラメーターを開く
      focusedId=null;
      if(canControl(hit)) select(hit); else profileView(hit);
    } else {                                             // 1回目：白く光らせる
      focusedId=hit.id; ensureAudio(); sfx('click');
    }
    return;
  }
  else {
    focusedId=null;                                      // 何もない所をタップで解除
    const idols=employees.filter(c2=>c2.kind==='idol');
    // アイドル本人：自分の部屋のプレゼントをタップ→移動先をタップ
    if(giftSel){
      const owner=employees.find(c2=>c2.id===giftSel.idol);
      const oi=idols.indexOf(owner);
      if(owner && oi>=0 && oi<ART_ROOMS.length && canControl(owner)){
        const r0=ART_ROOMS[oi];
        if(wx>=r0.x&&wx<=r0.x+r0.w&&wy>=r0.y&&wy<=r0.y+r0.h){
          giftSel.fx=Math.min(1,Math.max(0,(wx-r0.x-10-18)/(r0.w-56)));
          giftSel.fy=Math.min(1,Math.max(0,(wy-r0.y-18-14)/(r0.h-56)));
          saveGifts(); sfx('save'); toast('🎁 移動しました');
          giftSel=null; return;
        }
      }
      giftSel=null; toast('移動をやめました'); return;
    }
    if(CAL_SPOT && wx>=CAL_SPOT.x-4&&wx<=CAL_SPOT.x+CAL_SPOT.w+4&&wy>=CAL_SPOT.y-4&&wy<=CAL_SPOT.y+CAL_SPOT.h+4){
      ensureAudio(); sfx('click'); calView(); return;
    }
    if(SUP_SPOT && wx>=SUP_SPOT.x-4&&wx<=SUP_SPOT.x+SUP_SPOT.w+4&&wy>=SUP_SPOT.y-4&&wy<=SUP_SPOT.y+SUP_SPOT.h+4){
      ensureAudio(); sfx('click'); supportMenu(); return;
    }
    const idxById=new Map(idols.map((c2,i)=>[c2.id,i]));
    for(const g of gifts){
      const i=idxById.get(g.idol);
      if(i==null||i>=ART_ROOMS.length) continue;
      const r2=ART_ROOMS[i];
      const gx=Math.round(r2.x+10+(g.fx||0)*(r2.w-56)), gy=Math.round(r2.y+18+(g.fy||0)*(r2.h-56));
      if(wx>=gx-3&&wx<=gx+41&&wy>=gy-3&&wy<=gy+29){
        const owner=idols[i];
        if(canControl(owner)){ ensureAudio(); sfx('click'); giftSel=g; toast('🎁 置きたい場所をタップ'); return; }
        break;                                     // 他人の物は動かせない→通常処理へ
      }
    }
    for(let i=0;i<idols.length&&i<ART_ROOMS.length;i++){
      const r2=ART_ROOMS[i], bx0=r2.x+r2.w-34, by0=r2.y+r2.h-32;
      if(wx>=bx0&&wx<=bx0+30&&wy>=by0&&wy<=by0+30){ ensureAudio(); sfx('click'); diaryView(idols[i]); return; }
    }
    const st=STALLS.find(s2=>wx>=s2.x&&wx<=s2.x+s2.w&&wy>=s2.y&&wy<=s2.y+s2.h);
    if(st){ ensureAudio(); sfx('click'); openStall(st.type); return; }
    if(selected){
      if(!canControl(selected)){ toast('本人（追加した人）だけが動かせます'); return; }
      let txv=clamp(wx,BND.x1,BND.x2), tyv=clamp(wy,BND.y1,BND.y2);
      if(selected.kind!=='idol'){
        const z=fanZoneHit(txv,tyv);
        if(z){ tyv=z.push; toast(z.msg); }
      }
      const nowT=Date.now();
      if(selected.moving && nowT-lastMoveTap<420){        // 歩行中に2回タップ→走る
        if(!selected.dash){ selected.dash=true; toast('💨 ダッシュ！'); }
      } else if(!selected.moving){ selected.dash=false; }
      lastMoveTap=nowT;
      selected.tx=txv; selected.ty=tyv; saveEmployees(); fbTouch(selected); }
  }
}
const ptrs=new Map();
let pinch=null, tapInfo=null, gesturePinched=false, lastMoveTap=0;
let focusedId=null;                                    // 1回目タップで白く光る
cv.addEventListener('pointerdown',e=>{
  try{ cv.setPointerCapture(e.pointerId); }catch(err){}
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1){ tapInfo={id:e.pointerId,x:e.clientX,y:e.clientY,t:Date.now()}; gesturePinched=false; }
  else if(ptrs.size===2){
    const [a,b]=[...ptrs.values()];
    pinch={d:Math.max(10,Math.hypot(a.x-b.x,a.y-b.y)), z:cam.z,
           mx:(a.x+b.x)/2, my:(a.y+b.y)/2};
    gesturePinched=true; tapInfo=null;
  }
});
cv.addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pinch && ptrs.size===2){
    const [a,b]=[...ptrs.values()];
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d>10) cam.z=Math.min(2,Math.max(0.6, pinch.z*d/pinch.d));
    // 2本指スライドでマップ移動
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const r=cv.getBoundingClientRect();
    cam.x-=(mx-pinch.mx)*(VW/r.width)/cam.z;
    cam.y-=(my-pinch.my)*(VH/r.height)/cam.z;
    pinch.mx=mx; pinch.my=my;
    manualCam=true;
  }
});
function endPtr(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size<2) pinch=null;
  if(tapInfo && tapInfo.id===e.pointerId && !gesturePinched){
    const moved=Math.hypot(e.clientX-tapInfo.x, e.clientY-tapInfo.y);
    if(moved<9 && Date.now()-tapInfo.t<600) handleTap(e);
  }
  if(tapInfo && tapInfo.id===e.pointerId) tapInfo=null;
}
cv.addEventListener('pointerup',endPtr);
cv.addEventListener('pointercancel',endPtr);

function drawGiftSprite(type,x,y,seed){

    const petal=['#ff6ab0','#ffd23f','#e05a5a','#9b6ee0'][seed%4];

    q(x+5,y+4,2,4,'#2f8f45');                                                  // 茎
    q(x+3,y+1,6,4,petal); q(x+5,y+0,2,2,petal); q(x+5,y+2,2,2,'#ffd23f');      // 花
  } else if(type==='bear'){
    q(x+1,y+3,12,10,OL); q(x+2,y+4,10,8,'#c08a4a'); q(x+2,y+4,10,2,'#d6a066'); // 体
    q(x+3,y+0,8,6,OL); q(x+4,y+1,6,4,'#c08a4a');                               // 頭
    q(x+3,y+0,2,2,'#c08a4a'); q(x+9,y+0,2,2,'#c08a4a');                        // 耳

    q(x+5,y+7,4,3,'#ffe6c4');                                                  // おなか
  } else if(type==='tansu'){
    q(x,y,24,32,OL); q(x+1,y+1,22,30,'#8a5a34'); q(x+1,y+1,22,3,'#a5713a');
    q(x+3,y+6,18,7,'#6e4a24'); q(x+3,y+15,18,7,'#6e4a24'); q(x+3,y+24,18,6,'#6e4a24');
    q(x+11,y+8,2,2,'#f0c040'); q(x+11,y+17,2,2,'#f0c040'); q(x+11,y+26,2,2,'#f0c040');
  } else if(type==='bed'){
    q(x,y,38,24,OL); q(x+1,y+1,36,22,'#ffffff'); q(x+1,y+1,36,5,'#ff9fc8');

    q(x+1,y+21,36,2,'#8a5a34');
  } else if(type==='poster'){
    q(x,y,16,20,OL); q(x+1,y+1,14,18,'#ffffff'); q(x+2,y+2,12,16,'#ff3ea5');
    q(x+6,y+6,4,4,'#ffd23f'); q(x+4,y+12,8,2,'#ffffff');
  } else if(type==='plant'){
    q(x+3,y+10,10,8,OL); q(x+4,y+11,8,6,'#b06a3a'); q(x+4,y+11,8,2,'#c98a4a'); // 鉢
    q(x+6,y+2,4,8,'#2f8f45'); q(x+2,y+4,4,4,'#57c46a'); q(x+10,y+3,4,5,'#57c46a'); q(x+6,y+0,4,3,'#7ccf6e');
  } else if(type==='lamp'){

    q(x+2,y+2,10,7,OL); q(x+3,y+3,8,5,'#ffd23f'); q(x+3,y+3,8,2,'#ffe36a');    // シェード
    q(x+5,y+9,4,2,'#ffe36a88');

function drawGifts(){
  if(!gifts.length) return;
  const idols=employees.filter(c=>c.kind==='idol');
  const idxById=new Map(idols.map((c,i)=>[c.id,i]));
  for(const g of gifts){
    const i=idxById.get(g.idol);
    if(i==null||i>=ART_ROOMS.length) continue;
    const r=ART_ROOMS[i];
    const x=Math.round(r.x+10+(g.fx||0)*(r.w-56)), y=Math.round(r.y+18+(g.fy||0)*(r.h-56));
    if(giftSel && giftSel.id===g.id){
      ctx.fillStyle='#ffd23f'; ctx.fillRect(x-4,y-4,46,34);
      ctx.fillStyle='#fff8e0'; ctx.fillRect(x-2,y-2,42,30);
    }
    if(g.type==='stand' && g.grid) drawFlowerStand(g,x,y);
    else drawGiftSprite(g.type,x,y,(g.id||'').length);
  }
}
/* 自作フラワースタンド（STAND_W×STAND_H のドット＋三脚＋名前プレート） */
const STAND_W=10, STAND_H=10;
function drawFlowerStand(g,x,y){
  const grid=g.grid; const px=(a,b,c,d,col)=>{ctx.fillStyle=col;ctx.fillRect(x+a,y+b,c,d);};
  // 三脚スタンド
  px(4,20,2,10,'#6e4a24'); px(14,20,2,10,'#6e4a24'); px(9,24,2,8,'#6e4a24');
  px(2,30,16,2,'#4a3016');
  // 花のパネル背景
  px(-1,-1,STAND_W*2+2,STAND_H*2+2,'#20182e'); px(0,0,STAND_W*2,STAND_H*2,'#3a2f2a');
  for(let fy=0;fy<STAND_H;fy++)for(let fx=0;fx<STAND_W;fx++){
    const col=grid[fy]&&grid[fy][fx]; if(col){ ctx.fillStyle=col; ctx.fillRect(x+fx*2,y+fy*2,2,2); }
  }
  // 推し名プレート
  px(1,STAND_H*2+1,STAND_W*2-2,5,'#fff7e0'); px(1,STAND_H*2+1,STAND_W*2-2,1,'#ffd23f');
  ctx.fillStyle='#a5701a'; ctx.font='4px "DotGothic16",monospace'; ctx.textBaseline='top';
  ctx.fillText('♥'+((g.from||'')).slice(0,5), x+2, y+STAND_H*2+2);
}
/* 噴水の水しぶき（毎フレーム） */
function drawFountainFx(t){
  const f=FOUNTAIN; if(!f) return;
  ctx.fillStyle='#bfe6f5';
  for(let i=0;i<6;i++){
    const ph=t*2.6+i*1.05, hgt=Math.abs(Math.sin(ph))*16;
    ctx.fillRect(f.x-5+i*2, f.y-24-hgt, 2, 2);
    if(hgt>10) ctx.fillRect(f.x-14+i*5, f.y-6+Math.sin(ph*2)*2, 2, 1);
  }
  ctx.fillStyle='#ffffff99';
  ctx.fillRect(f.x-24+((t*26)%48), f.y+2, 2, 1);
  ctx.fillRect(f.x+22-((t*18)%44), f.y+8, 2, 1);
}

/* ---------- 顔ドットエディタ（保存に課金） ---------- */
function defaultFace(c){
  const {hair,skin}=c.colors, OL='#20182e', g=[];
  for(let y=0;y<FACE_H;y++){ const row=[];
    for(let x=0;x<FACE_W;x++){
      let col=hair;
      if(y===3) col=(x===0||x===FACE_W-1)?hair:skin;
      else if(y===4) col=(x===2||x===5)?OL:skin;
      else if(y===5) col=(x===3||x===4)?'#b5544a':skin;
      row.push(col);
    } g.push(row);
  } return g;
}
function faceEditor(c){
  const PAL=['#20182e','#ffffff','#ffdcb0','#e0ac69','#3a2a1a','#6b4423','#c9a24a','#d8607a','#e05a5a','#ff3ea5','#ffd23f','#57c46a','#4a8fe0','#9b6ee0'];
  let grid=(Array.isArray(c.face)&&c.face.length===FACE_H)?c.face.map(r=>r.slice()):defaultFace(c);
  let cur=PAL[0];
  const cellsHtml=Array.from({length:FACE_H*FACE_W},(_,i)=>`<div class="sw fcell" data-i="${i}" style="border-radius:3px"></div>`).join('');

  openModal(`<h2>顔ドットエディタ</h2>

    </div>`);
  const paint=()=>{ card.querySelectorAll('.fcell').forEach(el=>{ const i=+el.dataset.i, col=grid[Math.floor(i/FACE_W)][i%FACE_W];
    el.style.background=col||'repeating-linear-gradient(45deg,#f4f4f4,#f4f4f4 3px,#e0e0e0 3px,#e0e0e0 6px)'; }); };
  card.querySelectorAll('.fcell').forEach(el=>{
    const h=()=>{ const i=+el.dataset.i; grid[Math.floor(i/FACE_W)][i%FACE_W]=cur||null; paint(); };
    el.addEventListener('pointerdown',e=>{ e.preventDefault(); h(); });
    el.addEventListener('pointerenter',e=>{ if(e.buttons) h(); });
  });
  card.querySelectorAll('.fpal').forEach(el=>el.onclick=()=>{
    card.querySelectorAll('.fpal').forEach(x=>x.classList.remove('on')); el.classList.add('on'); cur=el.dataset.c; });
  card.querySelector('#fRe').onclick=()=>{ grid=defaultFace(c); paint(); };
  card.querySelector('#fNo').onclick=closeModal;
  card.querySelector('#fOk').onclick=()=>{
    if(coins<FACE_COST){ toast('コインが足りません'); chargeModal(); return; }
    coins-=FACE_COST; saveCoins();

    refreshTag(c); saveEmployees(); fbTouch(c); sfx('save');
    toast('顔を保存しました'); closeModal();
  };
  paint();
}

function ytEmbed(u){
  u=(u||'').trim(); if(!u) return '';
  const m=u.match(/(?:youtu\.be\/|[?&]v=|\/live\/|\/shorts\/|\/embed\/)([\w-]{6,})/);
  if(m) return 'https://www.youtube.com/embed/'+m[1]+'?autoplay=1&playsinline=1';
  if(/^https?:\/\//.test(u)) return u;             // その他の埋め込み可能URLはそのまま
  return '';
}

function myChars(){ return employees.filter(c=>c.pw && myOwned[c.id]===c.pw); }
let memberIdx=0;
const FAN_TITLES=[  // レベル帯→称号
  [1,'見習いファン','#8f9bb3'],[3,'常連ファン','#57c46a'],[5,'古参ファン','#4a8fe0'],
  [8,'現場猛者','#9b6ee0'],[12,'伝説の推し戦士','#ff9f43'],[18,'推し活レジェンド','#ff3ea5'],
];
const FAN_SKILLS=[  // 解放レベル→できること
  [1,'💬 つぶやく','一言をつぶやける'],
  [2,'🎁 プレゼント','推しに贈り物ができる'],
  [3,'✊ 推しとジャンケン','推しとジャンケン勝負ができる'],
  [4,'🎮 ミニゲーム名人','ミニゲームで報酬アップ'],
  [5,'💐 フラワースタンド','自作スタンドを贈れる'],
  [7,'💪 応援ブースト','ペンライトの貯まりが増える'],
  [10,'👑 VIPファン','装備ショップにレア入荷'],
  [15,'🌟 カリスマ','推しレベルへの貢献2倍'],
];
function fanStats(c){
  let work=0,live=0,goods=0,total=0;
  for(const l of log){ if(l.name!==c.name) continue; total++;
    if(l.status==='work') work++;
    else if(l.status==='live'||l.status==='haishin') live++;
    else if(l.status==='lesson') goods++;
  }
  const cheki=c.cheki||0;
  const given=gifts.filter(g=>g.from===c.name).length;
  const items=(c.items||[]).length;
  const jkwin=(game&&game.ojk&&game.ojk[c.name]&&game.ojk[c.name].wins)||0;
  const exp=cheki*10+work*20+total*3+given*15+items*30+jkwin*8;   // 貢献・賞品・ジャンケンでも成長
  const lv=1+Math.floor(Math.sqrt(exp/10));
  const base=10*(lv-1)*(lv-1), next=10*lv*lv;
  const pct=Math.max(0,Math.min(100,Math.round((exp-base)/(next-base)*100)));
  let title=FAN_TITLES[0];
  for(const t of FAN_TITLES) if(lv>=t[0]) title=t;
  const skills=FAN_SKILLS.filter(sk=>lv>=sk[0]);
  const next_skill=FAN_SKILLS.find(sk=>lv<sk[0]);
  return {exp,lv,pct,next_exp:next-exp,title,skills,next_skill,params:[
    ['参戦力', Math.min(100,work*12),  '#ff3ea5'],
    ['配信力', Math.min(100,live*12),  '#4a8fe0'],
    ['物販力', Math.min(100,goods*12), '#3ac3c3'],
    ['愛（チェキ）', Math.min(100,cheki*4), '#e05a5a'],
    ['活動量', Math.min(100,total*4),  '#57c46a'],
  ]};
}
function fanLv(c){ return fanStats(c).lv; }
function hasSkill(c,lvNeeded){ return fanLv(c)>=lvNeeded; }

function diaryWrite(idol){
  if(!canControl(idol)){ toast('日記は本人（と運営）だけが書けます'); return; }
  let imgData=null;
  openModal(`<h2>✏️ ${esc(idol.name)} の日記を書く</h2>

      <img id="dPrev" style="display:none;max-width:100%;border:2px solid #b98a2a;border-radius:8px;margin-top:6px">
      <p id="dImgInfo" style="font-size:10px;opacity:.7;margin:4px 0 0"></p>

    <div class="modal-actions">

      <button class="mini" id="dwOk" style="background:#ff3ea5;color:#fff;border-color:#c02a7a;box-shadow:0 2px 0 #c02a7a">保存する</button></div>`);
  card.querySelector('#dwNo').onclick=()=>diaryView(idol);
  const tx=card.querySelector('#dTx'); tx.focus();
  const prev=card.querySelector('#dPrev'), info=card.querySelector('#dImgInfo');
  card.querySelector('#dImg').addEventListener('change',ev=>{
    const f=ev.target.files&&ev.target.files[0]; if(!f) return;
    info.textContent='圧縮中…';
    const rd=new FileReader();
    rd.onload=()=>{
      const im=new Image();
      im.onload=()=>{
        const shrink=(maxW,q)=>{
          const sc=Math.min(1,maxW/im.width);
          const cw=Math.max(1,Math.round(im.width*sc)), ch=Math.max(1,Math.round(im.height*sc));
          const c2=document.createElement('canvas'); c2.width=cw; c2.height=ch;
          c2.getContext('2d').drawImage(im,0,0,cw,ch);
          return c2.toDataURL('image/jpeg',q);
        };
        let d=shrink(480,.7);
        if(d.length>200000) d=shrink(360,.6);
        if(d.length>200000) d=shrink(280,.5);
        if(d.length>250000){ info.textContent='この写真は大きすぎて添付できません'; imgData=null; prev.style.display='none'; return; }
        imgData=d; prev.src=d; prev.style.display='block';
        info.textContent='添付OK（約'+Math.round(d.length*0.75/1024)+'KB・30日で自動削除）';
      };
      im.onerror=()=>{ info.textContent='画像を読めませんでした'; };
      im.src=rd.result;
    };
    rd.readAsDataURL(f);
  });
  card.querySelector('#dwOk').onclick=()=>{
    const v=(tx.value||'').trim();
    if(!v && !imgData){ toast('内容か写真を入れてください'); return; }
    const arr=diaries[idol.id]||[];
    const entry={ts:Date.now(),text:v};
    if(imgData) entry.img=imgData;
    arr.push(entry);
    while(arr.length>30) arr.shift();
    pruneDiaryImgs(arr);
    diaries[idol.id]=arr;
    saveDiaries(); sfx('save'); toast('📖 日記を書きました'); diaryView(idol);
  };
}

function marqueeText(){
  const todayStr=new Date().toISOString().slice(0,10);
  const ups=events.filter(e=>e.date>=todayStr).sort((a,b)=>a.date<b.date?-1:1).slice(0,3);

  return ups.map(e=>fmtDate(e.date)+' '+e.text).join('　★　');
}
function drawMarquee(t){
  const m=MARQ; if(!m) return;
  ctx.save();
  ctx.beginPath(); ctx.rect(m.x+2,m.y+2,m.w-4,m.h-4); ctx.clip();
  ctx.font='bold 12px "DotGothic16",monospace'; ctx.textBaseline='middle';
  const txt=marqueeText();
  const tw=Math.max(40,ctx.measureText(txt).width);
  const span=tw+m.w;
  const off=(t*30)%span;
  const x=m.x+m.w-off;
  ctx.fillStyle='#ff4a4a'; ctx.fillText(txt,x,m.y+m.h/2+1);
  ctx.fillStyle='#7a1616'; ctx.globalAlpha=.35; ctx.fillText(txt,x+1,m.y+m.h/2+2); ctx.globalAlpha=1;
  ctx.restore();
}

function drawHunt(t){
  const h=game.hunt; if(!h||!h.on) return;
  if(h.startAt && Date.now()<h.startAt) return;          // お知らせ中はまだ出ない
  const bob=Math.sin(t*3)*2;
  const x=h.x-8, y=h.y-10+bob;
  ctx.fillStyle='#20182e'; ctx.fillRect(x-1,y-1,18,14);
  ctx.fillStyle='#a5713a'; ctx.fillRect(x,y,16,12);
  ctx.fillStyle='#c98a4a'; ctx.fillRect(x,y,16,4);
  ctx.fillStyle='#ffd23f'; ctx.fillRect(x+6,y+4,4,4);
  ctx.fillStyle='#fff8'; ctx.fillRect(x+2+((t*10)%12), y-4, 2,2);
  ctx.fillStyle='#ffd23f'; ctx.fillRect(x+16-((t*7)%14), y+13, 2,2);
}
function tryHunt(wx,wy){
  const h=game.hunt; if(!h||!h.on) return false;
  if(h.startAt && Date.now()<h.startAt) return false;
  if(Math.hypot(wx-h.x, wy-h.y)>16) return false;
  const me=myChars()[0];
  if(!me && !adminOn){ toast('宝箱だ！ 参加にはログインが必要です'); return true; }
  const name=me?me.name:'運営';
  game.hunt={on:false, winner:name, prize:h.prize, ts:Date.now()};
  if(me) giveItem(me, h.prize);
  announce(name+' さんが宝箱を発見！「'+h.prize+'」をゲット！🎉');
  sfx('fanfare');
  toast('🎉 宝箱発見！ '+h.prize+' をゲット！');
  return true;
}

/* ===== 3) 💡 みんなのペンライト ===== */
let penPend=null;
function penFlush(){
  if(!penPend) return;
  const p=game.pen||(game.pen={counts:{},by:{}});
  p.counts=p.counts||{}; p.by=p.by||{};
  const ups=[];
  for(const k in penPend.counts){
    if(k==='t') continue;
    const before=p.counts[k]||0, after=before+penPend.counts[k];
    p.counts[k]=after;
    if(Math.floor(after/100)>Math.floor(before/100)){
      const idol=employees.find(c=>c.id===k);
      if(idol) ups.push('★'+idol.name+' のペンライトゲージが Lv'+Math.floor(after/100)+' に！💡');
    }
  }
  for(const k in penPend.by){ if(k!=='t') p.by[k]=(p.by[k]||0)+penPend.by[k]; }
  clearTimeout(penPend.t);
  penPend=null; game.pen=p;
  if(ups.length){ announce(ups[0]); sfx('fanfare'); } else saveGame();
}
function penLight(){
  const idols=employees.filter(c=>c.kind==='idol');
  if(!idols.length){ toast('アイドルがまだいません'); return; }
  const me=myChars()[0];
  const name=me?me.name:(adminOn?'運営':'');

  const rows=idols.map((c,i)=>{
    const v=((p.counts||{})[c.id]||0)+(pend[c.id]||0);

    <p style="font-size:11px;opacity:.8;margin:0 2px 4px">タップで推しのゲージが貯まる！ 100回ごとにLvアップ。全員の合計で貯まります。</p>

    if(!name){ toast('参加にはログインが必要です'); return; }

    penPend=penPend||{counts:{},by:{}};
    penPend.counts[idol.id]=(penPend.counts[idol.id]||0)+1;

function showStart(starter){

  });

function showStop(){
  game.show={on:false}; saveGame(); toast('本番を終了しました'); updateShowBtn();
}
function showNextRound(r){
  const sh=game.show; if(!sh||!sh.on||sh.by!==clientId) return;
  sh.phase='game'; sh.round=r; sh.roundStart=Date.now()+5000; game.show=sh;
  const n=Object.keys(sh.joined||{}).length;
  announce('💡 ペンライトゲーム 第'+r+'回戦（全3回）！ いま '+n+'人参加中！ 全員ど真ん中を狙え！');
  setTimeout(()=>{ if(r<3) showNextRound(r+1); else showFinish(); }, 5000+12000);
}
function showFinish(){
  const sh=game.show; if(!sh||!sh.on||sh.by!==clientId) return;
  const totals={}, perfect=[];
  const names=Object.keys(sh.joined||{});
  names.forEach(nm=>{
    let tot=0, all30=true;
    for(let r=1;r<=3;r++){ const v=((sh.results||{})[r]||{})[nm]; tot+=(v||0); if(v!==30) all30=false; }
    totals[nm]=tot; if(all30) perfect.push(nm);
  });
  sh.phase='result'; sh.totals=totals; sh.perfect=perfect; game.show=sh;
  announce(perfect.length
    ? '🎉 結果発表！ '+perfect.join('・')+' さんが3回連続ど真ん中！ パーフェクト達成！'
    : '結果発表！ 3回ど真ん中パーフェクトは出ず…！ また次の本番で挑戦しよう！');
  sfx('fanfare');
  setTimeout(()=>{ if(game.show&&game.show.on&&game.show.by===clientId){ game.show={on:false}; saveGame(); } }, 20000);
}
/* 共有時刻からマーカー位置を計算（全端末で同じ動き） */
function showPos(){
  const sh=game.show; if(!sh||!sh.roundStart) return {wait:99};
  const el=(Date.now()-sh.roundStart)/1000;
  if(el<0) return {wait:-el};
  const per=1.7, ph=(el%per)/per;
  return {pos:(ph<.5? ph*2 : (1-ph)*2)*97};
}
function showPlay(){
  const sh=game.show;
  if(!sh||!sh.on){ toast('いまは本番中ではありません'); return; }
  const me=myChars()[0];
  const name=me?me.name:(adminOn?'運営':'');

      <button class="mini" id="shGo" style="background:#ff3ea5;color:#fff;border-color:#c02a7a;box-shadow:0 2px 0 #c02a7a;flex:1;justify-content:center">💡 ここで止める！</button></div>`);
  const mk=card.querySelector('#shMk'), info=card.querySelector('#shInfo'),
        cnt=card.querySelector('#shCount'), res=card.querySelector('#shRes'),
        btn=card.querySelector('#shGo');
  card.querySelector('#shX').onclick=closeModal;
  function myScore(r){ const s2=game.show; return (((s2||{}).results||{})[r]||{})[name]; }
  function tick(){
    if(!card.contains(mk)) return;
    const s2=game.show;
    if(!s2||!s2.on){ info.textContent='本番は終了しました'; btn.disabled=true; return; }
    cnt.textContent='🔥 '+Object.keys(s2.joined||{}).length+'人参加中！';
    if(s2.phase==='dance'){ info.textContent='アイドルがダンス中♪ まもなくゲーム開始…'; btn.disabled=true; }
    else if(s2.phase==='result'){
      btn.disabled=true;
      const tt=s2.totals||{};
      const rank=Object.entries(tt).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n2,v],i)=>(i+1)+'位 '+n2+'（'+v+'点）').join(' ／ ');
      info.textContent=(s2.perfect&&s2.perfect.length)?('🎉 パーフェクト：'+s2.perfect.join('・')):'パーフェクトならず…！';
      res.textContent=rank||'';

    else if(s2.phase==='game'){
      const r=s2.round, got=myScore(r);
      const p=showPos();
      if(p.wait!==undefined && p.wait<99){ info.textContent='第'+r+'回戦（全3回）… '+Math.ceil(p.wait)+' 秒前！'; btn.disabled=true; mk.style.left='0%'; }
      else if(got!=null){ info.textContent='第'+r+'回戦：あなたは '+(got===30?'🎯ど真ん中！':(got===10?'✨おしい！':'ざんねん…'))+'（'+got+'点）'; btn.disabled=true; }
      else { info.textContent='第'+r+'回戦！ ピンクのど真ん中で止めろ！'; btn.disabled=false; mk.style.left=p.pos+'%'; }
    }
    requestAnimationFrame(tick);
  }
  btn.onclick=()=>{
    const s2=game.show; if(!s2||!s2.on||s2.phase!=='game') return;
    const r=s2.round; if(myScore(r)!=null) return;
    const p=showPos(); if(p.pos===undefined) return;
    const d=Math.abs(p.pos+3.5-50);
    const win=d<=6?30:(d<=16?10:0);
    s2.results=s2.results||{}; s2.results[r]=s2.results[r]||{}; s2.results[r][name]=win;
    game.show=s2; saveGame();
    sfx(win===30?'fanfare':(win===10?'coin':'delete'));
    res.textContent=win===30?'🎯 ど真ん中！＋30点':(win===10?'✨ おしい！＋10点':'ざんねん…0点');
  };
  tick();
}

/* ステージ演出（ビーム・紙吹雪・ストロボ床） */
function drawShowFx(t){
  const sh=game.show; if(!sh||!sh.on) return;
  const ax=AREA_X[1], cx2=AREA_X[1]+VW/2, topY=56;
  ctx.save();
  // 回転ビーム
  for(let k=0;k<4;k++){
    const ang=Math.sin(t*.9+k*1.7)*.9 + (k-1.5)*.5;
    const len=300, wHalf=26+8*Math.sin(t*2+k);
    ctx.fillStyle=['#ff3ea5','#7dfcff','#ffd23f','#9b6ee0'][k]+'22';
    ctx.beginPath();
    ctx.moveTo(cx2,topY);
    ctx.lineTo(cx2+Math.sin(ang)*len-wHalf, topY+Math.cos(ang)*len);
    ctx.lineTo(cx2+Math.sin(ang)*len+wHalf, topY+Math.cos(ang)*len);
    ctx.closePath(); ctx.fill();
  }
  // ストロボ床
  const fl=Math.floor(t*4)%3;
  ctx.fillStyle=['#ff3ea511','#7dfcff11','#ffd23f11'][fl];
  ctx.fillRect(ax+10,196,VW-20,290);
  // 紙吹雪
  const cols=['#ff3ea5','#7dfcff','#ffd23f','#57c46a','#ff9f43'];
  for(let i=0;i<26;i++){
    const px=ax+14+((i*53 + t*(34+(i%4)*12))%(VW-28));
    const py=44+((i*37 + t*(46+(i%5)*11))%440);
    ctx.fillStyle=cols[i%5];
    ctx.fillRect(px, py, 2, 3);
  }
  ctx.restore();
}

    if(rpsBeats(mine,opp)){
      rec.wins++; rec.streak++;
      const bonus=Math.min(30,5+rec.streak*3);
      coins+=bonus; saveCoins();
      saveGame(); fbTouch(me);
      res.textContent='🎉 勝ち！ ＋🪙'+bonus+(rec.streak>1?('（'+rec.streak+'連勝！）'):'');
      sfx(rec.streak>=3?'fanfare':'coin');
      if(rec.streak===5) announce(me.name+' さんが ★'+oshi.name+' に5連勝！ すごい！');
    } else {
      rec.streak=0; saveGame();
      res.textContent='まけ…！ また挑戦しよう'; sfx('delete');
    }

    updateCoinUI&&updateCoinUI();

}

const STAND_COST=120;
function blankStand(){ return Array.from({length:STAND_H},()=>Array(STAND_W).fill(null)); }
function templateStand(kind){
  const g=blankStand();
  const put=(x,y,c)=>{ if(x>=0&&x<STAND_W&&y>=0&&y<STAND_H) g[y][x]=c; };
  if(kind==='heart'){
    const pink='#ff3ea5';
    [[2,2],[3,1],[4,2],[5,2],[6,1],[7,2]].forEach(([x,y])=>put(x,y,pink));
    for(let y=2;y<=5;y++)for(let x=1;x<=8;x++){ if(Math.abs(x-4.5)<=(5-y)+2.5) put(x,y,pink); }
    put(4,6,pink);put(5,6,pink);
    for(let x=1;x<=8;x++) put(x,8,'#57c46a');
  } else if(kind==='star'){
    const y1='#ffd23f';
    put(4,0,y1);put(5,0,y1);put(4,1,y1);put(5,1,y1);
    for(let x=1;x<=8;x++)put(x,2,y1); put(3,3,y1);put(4,3,y1);put(5,3,y1);put(6,3,y1);
    put(2,4,y1);put(3,4,y1);put(6,4,y1);put(7,4,y1);
    put(1,5,y1);put(8,5,y1);
    for(let x=1;x<=8;x++) put(x,8,'#57c46a');
  } else { // bouquet
    const cols=['#ff3ea5','#ff9f43','#ffd23f','#9b6ee0','#4a8fe0'];
    for(let y=1;y<=5;y++)for(let x=1;x<=8;x++){ if(Math.random()<.6) put(x,y,cols[(x+y)%cols.length]); }
    for(let x=3;x<=6;x++) put(x,8,'#57c46a');
  }
  return g;
}

  tx:c.tx!=null?Math.round(c.tx):null,ty:c.ty!=null?Math.round(c.ty):null,
  todos:Array.isArray(c.todos)?c.todos:[]});
function bodyObj(){ return {idc,list:employees.map(ser),log,todos,gifts,diaries,events,game,adminPw,liveUrl,savedAt:Date.now(),editor:clientId}; }

function localSave(){    // 端末には保存しない（GitHubが唯一の保存先）。変更時刻だけ記録
  lastChange=Date.now();
}
function saveEmployees(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ localSave(); if(roomId){ dirty=true; pushNow(); } ghPushSoon(); },400); }
function saveLog(){ localSave(); if(roomId){ dirty=true; pushNow(); } ghPushSoon(); if(typeof fbCfg!=='undefined'&&fbCfg) fbSetLog(); }
let ghPushT=null;
function ghPushSoon(){ if(!ghCfg) return; clearTimeout(ghPushT); ghPushT=setTimeout(()=>{ if(ghCfg && lastChange>lastGhAt) ghCommit(); }, 1500); }
function mergeLogs(a,b){
  const m=new Map();
  [...(a||[]),...(b||[])].forEach(l=>{ if(l&&l.ts) m.set(l.ts+'|'+l.name+'|'+l.status,l); });
  return [...m.values()].sort((x,y)=>new Date(y.ts)-new Date(x.ts)).slice(0,1000);
}

/* ---------- GitHub 連携（10秒ごとに保存＝記録／同じリポジトリで共有） ---------- */
function saveGhCfg(){ try{ ghCfg?localStorage.setItem(K_GH,JSON.stringify(ghCfg)):localStorage.removeItem(K_GH); }catch(e){} }
function ghUrl(){ return `https://api.github.com/repos/${ghCfg.owner}/${ghCfg.repo}/contents/${ghCfg.path}`; }
function ghHead(){ return {'Authorization':'Bearer '+ghCfg.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}; }
const b64enc=s=>btoa(unescape(encodeURIComponent(s)));
const b64dec=s=>decodeURIComponent(escape(atob((s||'').replace(/\s/g,''))));
async function ghFetch(){ // returns parsed object or null(404)
  const r=await fetch(ghUrl()+'?ref='+encodeURIComponent(ghCfg.branch||'main')+'&_='+Date.now(),{headers:ghHead()});
  if(r.status===404){ ghSha=null; return null; }
  if(!r.ok) throw new Error('GitHub '+r.status);
  const j=await r.json(); ghSha=j.sha;
  try{ return JSON.parse(b64dec(j.content)); }catch(e){ return null; }
}
async function ghPull(){ if(!ghCfg||ghBusy) return;
  try{ const o=await ghFetch(); ghOK=true;
    if(o && (o.savedAt||0)>appliedAt){ appliedAt=o.savedAt||0; if(o.editor!==clientId){ applyRemote(o); log=mergeLogs(log,o.log||[]); if(Array.isArray(o.todos)){ todos=o.todos; renderTodos(); } localSave(); lastChange=0; } }
  }catch(e){ ghOK=false; } markShared();
}
async function ghCommit(){ if(!ghCfg||ghBusy) return; ghBusy=true;
  try{ const b=bodyObj(); const payload={ message:'auto-save '+new Date().toISOString(), content:b64enc(JSON.stringify(b)), branch:ghCfg.branch||'main' };
    if(ghSha) payload.sha=ghSha;
    let r=await fetch(ghUrl(),{method:'PUT',headers:{...ghHead(),'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.status===409||r.status===422){ ghBusy=false; await ghPull(); ghBusy=true; payload.sha=ghSha;
      r=await fetch(ghUrl(),{method:'PUT',headers:{...ghHead(),'Content-Type':'application/json'},body:JSON.stringify(payload)}); }
    if(r.ok){ const j=await r.json(); ghSha=j.content&&j.content.sha; appliedAt=b.savedAt; lastGhAt=Date.now(); ghOK=true; }
    else ghOK=false;
  }catch(e){ ghOK=false; } ghBusy=false; markShared();
}
async function ghTick(){ if(!ghCfg||ghBusy) return;
  await ghPull();                              // 他端末の変更を取り込む
  if(lastChange>lastGhAt) await ghCommit();    // 変更があれば記録
}
/* 5秒ごと：書き込み（変更があれば）→ 読み取り */
async function ghCycle(){
  if(fbCfg) return;                            // Firebase使用中はGitHubサイクルを止める
  if(!ghCfg){ pubPull(); return; }             // トークン無し：読み取りのみ
  if(ghBusy) return;
  if(lastChange>lastGhAt) await ghCommit();     // 書き込み
  await ghPull();                               // 読み取り
}

function saveFbCfg(){ try{ fbCfg?localStorage.setItem(K_FB,JSON.stringify(fbCfg)):localStorage.removeItem(K_FB); }catch(e){} }
function fbBase(){ return fbCfg.url.replace(/\/+$/,'')+'/rooms/'+encodeURIComponent(fbCfg.room||'fans'); }
function charsMap(){ const m={}; employees.forEach(c=>m[c.id]=ser(c)); return m; }
async function fbGet(){ const r=await fetch(fbBase()+'.json'); if(!r.ok) throw new Error('FB '+r.status); return await r.json(); }
let lastFbFullAt=0;
async function fbPushAll(){ lastFbFullAt=Date.now(); try{ await fetch(fbBase()+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({chars:charsMap(), log:log, todos:todos, gifts:gifts, diaries:diaries, events:events, game:game, adminPw:adminPw, liveUrl:liveUrl})}); fbOK=true; }catch(e){ fbOK=false; } markShared(); }
function fbApply(data){

  }catch(e){ fbOK=false; } markShared();
}
function scheduleFbPull(){ clearTimeout(fbPullT); fbPullT=setTimeout(fbPull,250); }
/* 変更したキャラだけを書き込む（衝突に強い） */
function fbTouch(c){ if(!fbCfg||!c) return; fbDirty.add(c.id); fbDel.delete(c.id); scheduleFbFlush(); }
function fbDelete(id){ if(!fbCfg) return; fbDel.add(id); fbDirty.delete(id); scheduleFbFlush(); }
function scheduleFbFlush(){ clearTimeout(fbFlushT); fbFlushT=setTimeout(fbFlush,350); }
async function fbFlush(){ if(!fbCfg) return;
  const patch={}; const byId=new Map(employees.map(c=>[c.id,c]));
  fbDirty.forEach(id=>{ const c=byId.get(id); if(c) patch[id]=ser(c); }); fbDirty.clear();
  fbDel.forEach(id=>{ patch[id]=null; }); fbDel.clear();
  if(!Object.keys(patch).length) return;
  try{ await fetch(fbBase()+'/chars.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)}); fbOK=true; }
  catch(e){ fbOK=false; } markShared();
}
async function fbLog(entry){ if(!fbCfg) return;
  try{ await fetch(fbBase()+'/log.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)}); }catch(e){}
}
function fbConnect(){
  if(!fbCfg) return;
  try{ if(fbES) fbES.close(); }catch(e){}
  try{
    fbES=new EventSource(fbBase()+'.json');
    fbES.addEventListener('put', scheduleFbPull);
    fbES.addEventListener('patch', scheduleFbPull);
    fbES.onopen=()=>{ fbOK=true; markShared(); };
    fbES.onerror=()=>{ fbOK=false; markShared(); try{fbES.close();}catch(e){} setTimeout(fbConnect,4000); };
  }catch(e){ fbOK=false; markShared(); }
}

/* --- server calls（複数プロバイダに対応 / IDを本文で返すkvdbを優先） --- */
const JB='https://jsonblob.com/api/jsonBlob';
const KV='https://kvdb.io';
const PROV={
  k:{ // kvdb.io — 作成時にIDを本文で返す（CORSヘッダー問題を回避）
    create: async(body)=>{ const r=await fetch(KV+'/',{method:'POST'}); if(!r.ok) throw new Error('kvdb '+r.status);
      const id=(await r.text()).trim(); if(!/^[A-Za-z0-9_-]{6,}$/.test(id)) throw new Error('kvdb id?'); await PROV.k.put(id,body); return id; },
    get: async(id)=>{ const r=await fetch(KV+'/'+id+'/s'); if(r.status===404) return null; if(!r.ok) throw new Error('kvdb get '+r.status);
      const t=await r.text(); return t?JSON.parse(t):null; },
    put: async(id,body)=>{ const r=await fetch(KV+'/'+id+'/s',{method:'PUT',headers:{'Content-Type':'text/plain'},body}); if(!r.ok) throw new Error('kvdb put '+r.status); }
  },
  j:{ // jsonblob.com（フォールバック）
    create: async(body)=>{ const r=await fetch(JB,{method:'POST',headers:{'Content-Type':'application/json'},body}); if(!r.ok) throw new Error('jsonblob '+r.status);
      const loc=r.headers.get('Location')||''; const id=loc.split('/').pop(); if(!id) throw new Error('jsonblob header?'); return id; },
    get: async(id)=>{ const r=await fetch(JB+'/'+id,{headers:{'Accept':'application/json'}}); if(r.status===404) return null; if(!r.ok) throw new Error('jsonblob get '+r.status); return await r.json(); },
    put: async(id,body)=>{ const r=await fetch(JB+'/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body}); if(!r.ok) throw new Error('jsonblob put '+r.status); }
  }
};
function splitRoom(code){ const i=(code||'').indexOf('~'); return i>0?[code.slice(0,i),code.slice(i+1)]:['j',code]; }
function netHint(msg){ msg=msg||''; if(/Failed to fetch|NetworkError|Load failed|TypeError/i.test(msg))
  return 'ネット接続がブロックされています。ファイルを公開URL（GitHub Pages等）に置いて開いてください'; return msg; }

async function serverGet(code){ const [p,id]=splitRoom(code); return await PROV[p].get(id); }
async function pushNow(){ if(!roomId) return; const [p,id]=splitRoom(roomId);
  try{ const b=bodyObj(); appliedAt=b.savedAt; await PROV[p].put(id, JSON.stringify(b)); dirty=false; sharedOK=true; }
  catch(e){ sharedOK=false; } markShared();
}

/* 他のスマホの変更を取り込む */
function applyRemote(o){
  if(!o||!o.list) return;
  if(o.adminPw){ adminPw=o.adminPw; checkAdminLocal(); }
  if(Array.isArray(o.gifts)) gifts=o.gifts;
  if(typeof o.liveUrl==='string') liveUrl=o.liveUrl;
  if(o.diaries&&typeof o.diaries==='object') diaries=o.diaries;
  if(Array.isArray(o.events)) events=o.events;
  if(o&&o.game&&typeof o.game==='object') game=o.game;
  idc=Math.max(idc,o.idc||1);
  const byId=new Map(employees.map(e=>[e.id,e])), seen=new Set();
  for(const s of o.list){ seen.add(s.id); let c=byId.get(s.id);
    if(!c){ addEmployee({...s,silent:true}); }
    else{
      c.name=s.name; c.role=s.role||''; c.status=s.status; c.task=s.task||''; c.gender=s.gender||'male'; if(s.colors)c.colors=s.colors;
      c.pw=s.pw||''; c.kind=s.kind||''; c.face=Array.isArray(s.face)?s.face:null; c.cheki=s.cheki||0; c.loginId=s.loginId||''; c.items=Array.isArray(s.items)?s.items:(c.items||[]); if(s.stats&&typeof s.stats==='object') c.stats=s.stats; if(Array.isArray(s.gear)) c.gear=s.gear; if(s.equip&&typeof s.equip==='object') c.equip=s.equip;
      if(Array.isArray(s.todos) && c!==todoChar){ c.todos=s.todos; }
      if(c!==selected){
        if(s.tx!=null){ c.tx=s.tx; c.ty=s.ty; }                                   // 同じ目的地へ歩く
        else if(s.x!=null && (Math.abs(s.x-c.x)>2||Math.abs(s.y-c.y)>2)){ c.tx=s.x; c.ty=s.y; }
        if(s.x!=null && Math.hypot(s.x-c.x,s.y-c.y)>60){ c.x=s.x; c.y=s.y; }        // 大ズレは補正
      }
      refreshTag(c);
    }
  }
  for(const c of [...employees]) if(!seen.has(c.id)){ c.tagEl&&c.tagEl.remove(); employees=employees.filter(e=>e!==c); if(selected===c)deselect(); }
  updateHud();
  if(selected){ document.getElementById('pName').textContent=selected.name;
    document.getElementById('pRole').textContent=selected.role||'';
    document.getElementById('pTask').textContent=selected.task?('一言: '+selected.task):''; buildStatusRow(selected); }
}

  }catch(e){ sharedOK=false; markShared(); }
  busy=false; if(dirty) pushNow();
}

/* --- room management --- */
function shareLink(){ return location.origin+location.pathname+'#room='+roomId; }
function extractRoom(s){ s=(s||'').trim(); const m=s.match(/room=([\w~-]+)/); return m?m[1]:s.replace(/[^\w~-]/g,''); }
function setRoom(id){ roomId=id; try{ localStorage.setItem(K_ROOM,id); }catch(e){} try{ location.hash='room='+id; }catch(e){} sharedOK=true; markShared(); }

async function createRoom(){ localSave();
  const body=JSON.stringify(bodyObj()); let lastErr='';
  for(const p of ['k','j']){
    try{ const id=await PROV[p].create(body); setRoom(p+'~'+id); toast('共有ルームを作成しました'); shareModal(); return; }
    catch(e){ lastErr=(e&&e.message)||String(e); }
  }
  alert('リアルタイム同期サーバーに接続できませんでした。\n理由: '+netHint(lastErr)+'\n\n'+
    'この画面（プレビュー内）では外部通信が遮断されるため、サーバー同期は使えません。\n\n'+
    '代わりに「① そのまま渡して共有」をお使いください：\n'+
    '・「リンクをコピー」または「この状態をHTMLファイルに保存」で今のキャラを保存\n'+
    '・それを相手に送れば、開くだけで同じキャラが表示されます（通信不要）。\n\n'+
    'リアルタイム同期をどうしても使う場合は、ファイルを公開URL（GitHub Pages 等）に置いて開いてください。');
}
async function joinRoom(input){ let code=extractRoom(input); if(!code){ toast('コードが不正です'); return; }
  let prov,id,data,lastErr='';
  try{
    if(code.includes('~')){ [prov,id]=splitRoom(code); data=await PROV[prov].get(id); }
    else { for(const p of ['k','j']){ try{ const d=await PROV[p].get(code); if(d){ prov=p; id=code; data=d; break; } }catch(e){ lastErr=(e&&e.message)||''; } } }
    if(!prov||!data){ toast('ルームが見つかりません'+(lastErr?'：'+netHint(lastErr):'')); return; }
  }catch(e){ toast('参加に失敗：'+netHint((e&&e.message)||'')); return; }
  setRoom(prov+'~'+id); appliedAt=0;
  employees.forEach(c=>c.tagEl&&c.tagEl.remove()); employees=[]; selected=null; deselect();
  applyRemote(data); log=mergeLogs(log,data.log||[]); appliedAt=data.savedAt||0; localSave();
  updateHud(); toast('ルームに参加しました'); shareModal();
}

function markShared(){ const b=document.getElementById('syncIc'); if(!b)return;
  if(fbCfg){ b.style.background = fbOK?'#ff9f43':'#ffd23f'; }         // オレンジ=即時リアルタイム
  else if(ghCfg){ b.style.background = ghOK?'#3fbf6a':'#ffd23f'; }    // 緑=GitHub同期
  else if(pubOK){ b.style.background = '#4aa3d8'; }                   // 青=自動読み込み（閲覧）
  else { b.style.background = '#8f9bb3'; }                            // 灰=未接続
}

async function connTest(){
  toast('接続テスト中…');
  const results=[];
  for(const p of ['k','j']){
    try{ const id=await PROV[p].create(JSON.stringify({test:1,savedAt:Date.now()})); results.push((p==='k'?'kvdb':'jsonblob')+' OK'); break; }
    catch(e){ results.push((p==='k'?'kvdb':'jsonblob')+' NG'); }
  }
  const ok=results.some(r=>r.includes('OK'));
  alert(ok ? '✅ 外部サーバーに接続できました。共有を利用できます。\n\n'+results.join(' / ')
           : '❌ 外部サーバーに接続できませんでした。\n\n'+results.join(' / ')+'\n\nこの環境は外部通信がブロックされています。Claudeのプレビュー内ではなく、ダウンロードして公開URLで開いてください。');
}
function copyText(t,msg){ try{ navigator.clipboard.writeText(t).then(()=>toast(msg),()=>toast(t)); }catch(e){ toast(t); } }

/* --- サーバー不要の「リンク／コード共有」（データをリンク自体に保存して渡す） --- */
function b64u(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function ub64u(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return decodeURIComponent(escape(atob(s))); }
function snapshotObj(){ return {t:1, list:employees.map(ser), log:log.slice(0,120), gifts:gifts, diaries:diaries, events:events, game:game, adminPw:adminPw, liveUrl:liveUrl}; }
function shareCode(){ return b64u(JSON.stringify(snapshotObj())); }
function shareDataLink(){ return location.origin+location.pathname+'#d='+shareCode(); }
function importSnapshot(o){
  if(o.adminPw){ adminPw=o.adminPw; checkAdminLocal(); }
  if(Array.isArray(o.gifts)) gifts=o.gifts;
  if(typeof o.liveUrl==='string') liveUrl=o.liveUrl;
  if(o.diaries&&typeof o.diaries==='object') diaries=o.diaries;
  if(Array.isArray(o.events)) events=o.events;
  if(o&&o.game&&typeof o.game==='object') game=o.game;
  employees.forEach(c=>c.tagEl&&c.tagEl.remove()); employees=[]; selected=null;
  (o.list||[]).forEach(s=>addEmployee({...s,silent:true}));
  if(o.log) log=mergeLogs(log,o.log);
  deselect(); updateHud(); localSave(); if(roomId) pushNow(); ghPushSoon();
}
function loadCode(str){
  try{ let s=(str||'').trim(); const enc = s.includes('d=') ? s.split('d=').pop() : s;
    const o=JSON.parse(ub64u(enc)); if(!o||!o.list) throw 0;
    importSnapshot(o); toast('共有データを読み込みました'); closeModal();
  }catch(e){ toast('コード／リンクを読めませんでした'); }
}
/* 今の状態を丸ごと埋め込んだ単体HTMLを書き出す（サーバー不要でそのまま渡せる） */
function exportHtml(){
  try{
    const code=shareCode();
    const clone=document.documentElement.cloneNode(true);
    ['#tags','#modalCard','#statusRow','#counts'].forEach(sel=>{ const el=clone.querySelector(sel); if(el) el.innerHTML=''; });
    const md=clone.querySelector('#modal'); if(md) md.classList.remove('show');
    const pn=clone.querySelector('#panel'); if(pn) pn.classList.remove('show');
    const pre=document.createElement('script'); pre.textContent='window.__PRELOAD__='+JSON.stringify(code)+';';
    const b=clone.querySelector('body'); b.insertBefore(pre, b.firstChild);
    const html='<!DOCTYPE html>\n'+clone.outerHTML;
    const blob=new Blob([html],{type:'text/html'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='fan-town_'+new Date().toISOString().slice(0,10)+'.html'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500); toast('HTMLファイルを書き出しました');
  }catch(e){ toast('書き出しに失敗しました'); }
}

/* セーブは廃止：変更は自動でGitHubへ保存されます */

/* GitHubリポジトリのデータを取得（トークンがあればAPI、無ければ公開ファイル） */
async function fetchRepoData(){
  if(ghCfg){ return await ghFetch(); }
  const qp=new URLSearchParams(location.search);
  let url=qp.get('data');
  if(!url && qp.get('owner') && qp.get('repo'))
    url=`https://raw.githubusercontent.com/${qp.get('owner')}/${qp.get('repo')}/${qp.get('branch')||'main'}/${qp.get('path')||'fan-town.json'}`;
  if(!url) url='fan-town.json';
  const r=await fetch(url+(url.includes('?')?'&':'?')+'_='+Date.now(),{cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return await r.json();
}
/* 「更新」ボタン：GitHubの最新データを読み込んで反映 */
async function refreshData(){
  ensureAudio(); sfx('click'); toast('GitHubから読み込み中…');
  try{
    const o=await fetchRepoData();
    if(o&&o.list){
      employees.forEach(c=>c.tagEl&&c.tagEl.remove()); employees=[]; selected=null; deselect();
      idc=o.idc||1; appliedAt=o.savedAt||0;
      o.list.forEach(s=>addEmployee({...s,silent:true}));
      log=mergeLogs(log,o.log||[]);
      updateHud(); ghOK=true; markShared(); toast('最新データに更新しました');
    } else toast('データが空でした');
  }catch(e){ if(ghCfg){ ghOK=false; markShared(); } toast('更新に失敗（オンライン/設定を確認）'); }
}
/* 更新ボタンは廃止（自動同期のため不要） */

/* トークン未設定でも、公開データを自動で読み込む（閲覧同期） */
async function pubPull(){
  if(ghCfg) return;
  try{
    const o=await fetchRepoData();
    const sig=o&&o.list ? (JSON.stringify(o.list)+'|'+(o.savedAt||0)) : '';
    if(o&&o.list && sig!==lastSig){ lastSig=sig; appliedAt=Math.max(appliedAt,o.savedAt||0);
      applyRemote(o); log=mergeLogs(log,o.log||[]); if(Array.isArray(o.todos)){ todos=o.todos; renderTodos(); } updateHud(); }
    pubOK=true;
  }catch(e){ pubOK=false; }
  markShared();
}

/* ---------- 起動時の読み込み ---------- */
async function loadAll(){
  let ok=false, fromFb=false;
  // ⓪ 共有リンク／単体HTMLの埋め込みデータがあれば最優先で読む
  try{
    let pre=null;
    if(window.__PRELOAD__) pre=window.__PRELOAD__;
    else if(location.hash.includes('d=')) pre=location.hash.split('d=').pop();
    if(pre){ const o=JSON.parse(ub64u(pre));
      if(o&&o.adminPw) adminPw=o.adminPw;
      if(o&&Array.isArray(o.gifts)) gifts=o.gifts;
      if(o&&typeof o.liveUrl==='string') liveUrl=o.liveUrl;
      if(o&&o.diaries&&typeof o.diaries==='object') diaries=o.diaries;
      if(o&&Array.isArray(o.events)) events=o.events;
      if(o&&o.game&&typeof o.game==='object') game=o.game;
      if(o&&o.list){ o.list.forEach(s=>addEmployee({...s,silent:true})); if(o.log) log=mergeLogs(log,o.log); ok=employees.length>0; } }
  }catch(e){}
  // ⓪' Firebase（即時リアルタイム）があれば最優先
  if(!ok && fbCfg){
    try{ const data=await fbGet();
      if(data && data.adminPw) adminPw=data.adminPw;
      if(data && data.gifts) gifts=Array.isArray(data.gifts)?data.gifts:Object.values(data.gifts);
      if(data && typeof data.liveUrl==='string') liveUrl=data.liveUrl;
      if(data && data.diaries && typeof data.diaries==='object') diaries=data.diaries;
      if(data && data.events) events=Array.isArray(data.events)?data.events:Object.values(data.events);
      if(data&&data.game&&typeof data.game==='object') game=data.game;
      if(data && data.chars){ Object.values(data.chars).forEach(s=>addEmployee({...s,silent:true}));
        if(data.log) log=mergeLogs(log,Object.values(data.log));
        if(data.todos) todos=Array.isArray(data.todos)?data.todos:Object.values(data.todos);
        ok=employees.length>0; fbOK=true; fromFb=true; }
    }catch(e){ fbOK=false; }
    fbConnect();
  }
  // ① GitHub連携があれば読み込む（端末には保存しない）
  if(!ok && !fbCfg && ghCfg){
    try{ const o=await ghFetch(); if(o&&o.adminPw) adminPw=o.adminPw;
      if(o&&Array.isArray(o.gifts)) gifts=o.gifts;
      if(o&&typeof o.liveUrl==='string') liveUrl=o.liveUrl;
      if(o&&o.diaries&&typeof o.diaries==='object') diaries=o.diaries;
      if(o&&Array.isArray(o.events)) events=o.events;
      if(o&&o.game&&typeof o.game==='object') game=o.game;
      if(o&&o.list){ ghOK=true; idc=o.idc||1; appliedAt=o.savedAt||0;
      o.list.forEach(s=>addEmployee({...s,silent:true})); log=mergeLogs(log,o.log||[]); if(Array.isArray(o.todos)) todos=o.todos; ok=employees.length>0; }
    }catch(e){ ghOK=false; }
  }
  roomId=null;
  // ② GitHub上のデータファイルから初期キャラを読み込む（トークン不要・読み取り専用）
  if(!ok){
    try{
      const qp=new URLSearchParams(location.search);
      let url=qp.get('data');
      if(!url && qp.get('owner') && qp.get('repo'))
        url=`https://raw.githubusercontent.com/${qp.get('owner')}/${qp.get('repo')}/${qp.get('branch')||'main'}/${qp.get('path')||'fan-town.json'}`;
      if(!url) url='fan-town.json';   // 同じリポジトリに置いたデータ
      const r=await fetch(url+(url.includes('?')?'&':'?')+'_='+Date.now(),{cache:'no-store'});
      if(r.ok){ const o=await r.json();
        if(o&&o.adminPw) adminPw=o.adminPw;
        if(o&&Array.isArray(o.gifts)) gifts=o.gifts;
        if(o&&typeof o.liveUrl==='string') liveUrl=o.liveUrl;
        if(o&&o.diaries&&typeof o.diaries==='object') diaries=o.diaries;
        if(o&&Array.isArray(o.events)) events=o.events;
        if(o&&o.game&&typeof o.game==='object') game=o.game;
        if(o&&o.list){ idc=o.idc||1; appliedAt=o.savedAt||0; lastSig=JSON.stringify(o.list)+'|'+(o.savedAt||0);
          o.list.forEach(s=>addEmployee({...s,silent:true})); if(o.log) log=mergeLogs(log,o.log); if(Array.isArray(o.todos)) todos=o.todos;
          ok=employees.length>0; pubOK=true; }
      }
    }catch(e){}
  }
  // ③ どこにも無ければサンプルを表示
  if(!ok){ seed(); if(ghCfg && !fbCfg){ lastChange=Date.now(); ghCommit(); } }
  // Firebaseが空だった場合は、今の内容でDBを初期化
  if(fbCfg && !fromFb && employees.length){ fbPushAll(); }
  checkAdminLocal(); employees.forEach(refreshTag);
  markShared(); updateHud();
}

/* ---------- バックアップ / 復元（ファイル） ---------- */
function backup(){
  const data=JSON.stringify({ver:1,exportedAt:new Date().toISOString(), emp:{idc,list:employees.map(ser)}, log});
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='fan-town-backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('バックアップを保存しました');
}
function restore(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{ try{
      const o=JSON.parse(rd.result);
      employees.forEach(c=>c.tagEl&&c.tagEl.remove()); employees=[]; selected=null;
      idc=(o.emp&&o.emp.idc)||1;
      ((o.emp&&o.emp.list)||[]).forEach(s=>addEmployee({...s,silent:true}));
      log=mergeLogs(log, o.log||[]);
      deselect(); updateHud(); localSave(); if(roomId) pushNow(); ghPushSoon(); closeModal(); toast('復元しました');
    }catch(e){ toast('ファイルを読めませんでした'); } };
    rd.readAsText(f);
  };
  inp.click();
}

setInterval(()=>{ if(fbCfg && lastChange>lastFbFullAt){ fbPushAll(); } }, 15000);
